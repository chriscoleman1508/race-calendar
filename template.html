<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Racing Calendar</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }
      select,
      button {
        padding: 8px 12px;
        margin: 8px 4px;
        font-size: 1rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      td,
      th {
        border: 1px solid #ccc;
        padding: 8px 12px;
        text-align: left;
      }
      .day-header {
        background-color: #f0f0f0;
        font-weight: bold;
      }
      #status {
        color: grey;
        margin-top: 10px;
      }
      #error {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>WEC Racing Calendar</h1>

    <select id="race-select">
      <option value="imola">6 Hours of Imola</option>
      <option value="spa">6 Hours of Spa-Francorchamps</option>
      <option value="le_mans">24 Hours of Le Mans</option>
      <option value="brazil">Rolex 6 Hours of São Paulo</option>
      <option value="cota">Lone Star Le Mans</option>
      <option value="fuji">6 Hours of Fuji</option>
      <option value="qatar">Qatar 1812km</option>
      <option value="bahrain">Bapco Energies 8 Hours of Bahrain</option>
    </select>

    <button onclick="fetchSessions()">Get Sessions</button>

    <p id="status"></p>
    <p id="error"></p>

    <table id="results" style="display: none">
      <thead>
        <tr>
          <th>Session</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>

    <script>
      async function fetchSessions() {
        const race = document.getElementById("race-select").value;
        document.getElementById("status").textContent =
          "Loading... (this takes ~10 seconds)";
        document.getElementById("error").textContent = "";
        document.getElementById("results").style.display = "none";

        const response = await fetch("http://localhost:5000/scrape", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ race }),
        });

        const data = await response.json();
        document.getElementById("status").textContent = "";

        if (data.error) {
          document.getElementById("error").textContent = "Error: " + data.error;
          return;
        }

        const tbody = document.getElementById("results-body");
        tbody.innerHTML = "";

        for (const [day, sessions] of Object.entries(data.schedule)) {
          tbody.innerHTML += `<tr class="day-header"><td colspan="2">${day}</td></tr>`;
          for (const [session, time] of Object.entries(sessions)) {
            tbody.innerHTML += `<tr><td>&nbsp;&nbsp;&nbsp;${session}</td><td>${time}</td></tr>`;
          }
        }

        document.getElementById("results").style.display = "table";
      }
    </script>
  </body>
</html>
