name: Scrape Race Schedules

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WEC scraper
        run: python Scrapers/wec_scraper.py

      - name: Run F1 scraper
        run: python Scrapers/f1_scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Website/data/wec.json Website/data/f1.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update race schedule data"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
