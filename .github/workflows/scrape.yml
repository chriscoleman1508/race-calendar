name: Scrape WEC Schedule

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-wec-schedule
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        run: python wec_scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/wec.json
          if git diff --staged --quiet; then
            echo "::notice::No changes to commit"
            exit 0
          fi
          git commit -m "Update WEC schedule data"
          git pull --rebase origin main || {
            echo "::error::Failed to rebase onto origin/main"
            exit 1
          }
          if ! git push origin HEAD:main; then
            git pull --rebase origin main || {
              echo "::error::Failed to rebase onto origin/main for retry"
              exit 1
            }
            git push origin HEAD:main || {
              echo "::error::Failed to push scraped data after retry"
              exit 1
            }
          fi
