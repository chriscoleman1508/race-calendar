<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Race Calendar</title>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-title">Race Calendar</div>
        <div class="topbar-nav">
          <button id="prev-btn">←</button>
          <div class="month-title" id="month-title"></div>
          <button id="next-btn">→</button>
        </div>
      </header>

      <section class="this-week">
        <div class="section-label">This Week</div>
        <div class="this-week-cards" id="this-week-cards"></div>
      </section>

      <section class="calendar-section">
        <div class="weekdays" id="weekdays"></div>
        <div class="grid" id="calendar-grid"></div>
      </section>

      <aside class="sidebar">
        <div class="section-label">Series</div>
        <div id="series-list"></div>
      </aside>
    </div>

    <script src="script.js"></script>
  </body>
</html>
